strategy:
  name: "Example Equity Momentum Strategy"
  version: "1.0"
  description: >
    Simple equity momentum rotation strategy example.
    Selects top-ranked U.S. equities using multi-period momentum,
    rebalanced on a fixed interval.

universe:
  type: "equities"
  region: "US"
  universe_source: "example_universe"
  max_universe_size: 500

  filters:
    min_average_daily_dollar_volume: 5000000
    min_price: 5.0

signal:
  type: "momentum"
  momentum:
    lookback_months: 6
    skip_recent_months: 0
    ranking: "descending"

    absolute_momentum_filter:
      enabled: true
      min_momentum: 0.0
      risk_off_asset: "CASH"

portfolio:
  selection_method: "top_n"
  top_n: 5
  weighting:
    method: "equal"

rebalance:
  frequency: "monthly"
  trading_days_interval: 21
  rebalance_on_close: true

execution:
  slippage_bps: 10
  commission_bps: 5
