strategy:
  name: "Alpha v1 - Equity Momentum Rotation"
  version: "1.0"
  description: >
    Simple equity momentum rotation.
    Selects top-ranked U.S. equities using 12–1 momentum,
    rebalanced every N trading days.

universe:
  type: "equities"
  region: "US"
  universe_source: "sp500"
  max_universe_size: 150

  filters:
    min_average_daily_dollar_volume: 10000000
    min_price: 5.0

signal:
  type: "momentum"
  momentum:
    lookback_months: 12
    skip_recent_months: 1
    ranking: "descending"

    absolute_momentum_filter:
      enabled: true
      min_momentum: 0.0
      risk_off_asset: "CASH"

portfolio:
  selection_method: "top_n"
  top_n: 10
  weighting:
    method: "equal"

rebalance:
  frequency: "biweekly"
  trading_days_interval: 10
  rebalance_on_close: true

execution:
  slippage_bps: 5
  commission_bps: 1
